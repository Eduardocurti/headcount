<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meta vs. Real — Headcount por Loja e Centro de Custo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  :root{
    --bg:#FFFFFF;
    --bg-soft:#F7FAF8;
    --green:#0A6B2C;
    --green-mid:#0d8436;
    --green-bg:rgba(10,107,44,0.10);
    --green-border:rgba(10,107,44,0.15);
    --orange:#FF5028;
    --orange-bg:rgba(255,80,40,0.10);
    --purple:#6A4C93;
    --purple-bg:rgba(106,76,147,0.20);
    --text:#0d1412;
    --muted:#6b7e76;
    --radius:14px;
    --radius-sm:8px;
    --black:#0A0A0A;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg-soft);
    color:var(--text);
    font-family:'DM Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'DM Mono',monospace;}
  #app{max-width:1280px;margin:0 auto;padding:28px 24px 64px;}

  /* ---------- Header ---------- */
  .page-header{
    display:flex;align-items:flex-start;justify-content:space-between;
    gap:16px;margin-bottom:24px;flex-wrap:wrap;
  }
  .page-header h1{
    font-size:26px;font-weight:700;letter-spacing:-0.01em;margin:0 0 4px;
  }
  .page-header .eyebrow{
    display:inline-flex;align-items:center;gap:6px;
    font-size:12px;font-weight:600;color:var(--green);
    background:var(--green-bg);border:1px solid var(--green-border);
    padding:4px 10px;border-radius:999px;margin-bottom:10px;
  }
  .page-header p{margin:0;color:var(--muted);font-size:14px;}

  /* ---------- Cards generic ---------- */
  .card{
    background:var(--bg);
    border:1.5px solid var(--green-border);
    border-radius:var(--radius);
    box-shadow:0 2px 10px rgba(10,107,44,0.05);
    padding:20px;
  }

  /* ---------- Buttons ---------- */
  .btn{
    font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
    border-radius:var(--radius-sm);padding:9px 16px;border:1.5px solid transparent;
    transition:transform .12s ease, opacity .12s ease;
    display:inline-flex;align-items:center;gap:6px;
  }
  .btn:hover{opacity:.9;}
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--green);color:#fff;}
  .btn-secondary{background:#fff;color:var(--green);border-color:var(--green-border);}
  .btn-ghost{background:transparent;color:var(--muted);border-color:var(--green-border);}
  .btn-danger{background:#fff;color:var(--orange);border-color:rgba(255,80,40,0.3);}
  .btn:disabled{opacity:.6;cursor:default;}

  /* ---------- Upload zone ---------- */
  #uploadZone{
    display:flex;align-items:center;justify-content:center;min-height:60vh;
  }
  #uploadZone:empty{display:none;min-height:0;}
  .upload-box{
    max-width:520px;width:100%;text-align:center;
    border:1.5px dashed var(--green-border);
    border-radius:var(--radius);background:#fff;
    padding:48px 32px;
  }
  .upload-box.dragover{background:var(--green-bg);border-color:var(--green);}
  .upload-icon{
    width:56px;height:56px;border-radius:50%;background:var(--green-bg);
    display:flex;align-items:center;justify-content:center;margin:0 auto 18px;
    font-size:26px;color:var(--green);
  }
  .upload-box h3{margin:0 0 8px;font-size:18px;}
  .upload-box p{margin:0 0 20px;color:var(--muted);font-size:13.5px;}
  .col-list{
    text-align:left;background:var(--bg-soft);border-radius:var(--radius-sm);
    padding:14px 16px;margin:18px 0;font-size:12.5px;color:var(--text);
  }
  .col-list b{color:var(--green);}
  .col-list ul{margin:6px 0 0;padding-left:18px;}

  /* ---------- Filters ---------- */
  .filters-card{margin-bottom:20px;}
  .filters-grid{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-end;}
  .filter-block{flex:1;min-width:220px;}
  .filter-block label{
    display:block;font-size:11.5px;font-weight:600;text-transform:uppercase;
    letter-spacing:.04em;color:var(--muted);margin-bottom:8px;
  }
  select#monthSelect{
    width:100%;padding:10px 12px;border-radius:var(--radius-sm);
    border:1.5px solid var(--green-border);font-family:inherit;font-size:14px;
    background:#fff;color:var(--text);
  }
  .store-dropdown{position:relative;}
  .store-dropdown-btn{
    width:100%;text-align:left;background:#fff;border:1.5px solid var(--green-border);
    border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;cursor:pointer;
    display:flex;justify-content:space-between;align-items:center;
  }
  .store-panel{
    position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:20;
    background:#fff;border:1.5px solid var(--green-border);border-radius:var(--radius-sm);
    box-shadow:0 8px 24px rgba(10,20,15,0.12);max-height:320px;overflow:auto;
    padding:8px;display:none;
  }
  .store-panel.open{display:block;}
  .store-panel-actions{display:flex;justify-content:space-between;padding:4px 6px 8px;border-bottom:1px solid var(--green-border);margin-bottom:6px;}
  .store-panel-actions a{font-size:12px;color:var(--green);font-weight:600;cursor:pointer;text-decoration:none;}
  .store-opt{display:flex;align-items:center;gap:8px;padding:6px 6px;border-radius:6px;font-size:13px;cursor:pointer;}
  .store-opt:hover{background:var(--green-bg);}
  .store-opt input{accent-color:var(--green);width:15px;height:15px;}
  .filter-apply{flex:0 0 auto;}

  /* ---------- KPIs ---------- */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px;}
  .kpi-grid-5{grid-template-columns:repeat(5,1fr);}
  .kpi-diff-row{display:flex;gap:14px;}
  .kpi-diff-col{flex:1;}
  .kpi-value-sm{font-size:22px;}
  .kpi-card{padding:18px 20px;}
  .kpi-label{font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600;margin-bottom:8px;}
  .kpi-value{font-size:30px;font-weight:700;font-family:'DM Mono',monospace;}
  .kpi-sub{font-size:12px;color:var(--muted);margin-top:4px;}
  .kpi-value.positive{color:var(--green);}
  .kpi-value.negative{color:var(--orange);}

  /* ---------- Charts ---------- */
  .charts-row{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;}
  .chart-card{padding:20px;}
  .chart-card h3{margin:0 0 4px;font-size:15px;font-weight:700;}
  .chart-card .chart-sub{font-size:12px;color:var(--muted);margin:0 0 14px;}
  .chart-full{width:100%;}
  .chart-half{flex:1;min-width:320px;}
  .chart-wrap{position:relative;height:280px;}

  /* ---------- Table ---------- */
  .table-card{padding:0;overflow:hidden;}
  .table-card-head{
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;
    padding:18px 20px 12px;
  }
  .table-card-head h3{margin:0;font-size:16px;font-weight:700;}
  .legend{display:flex;gap:16px;font-size:12px;color:var(--muted);align-items:center;}
  .legend .dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px;}
  .dot-green{background:var(--green);}
  .dot-orange{background:var(--orange);}
  #exportTarget{background:#fff;}
  .export-header{display:none;padding:18px 20px;background:var(--green);color:#fff;}
  .export-header.show{display:block;}
  .export-header .t1{font-size:18px;font-weight:700;margin:0;}
  .export-header .t2{font-size:12px;opacity:.85;margin:4px 0 0;}
  .table-scroll{overflow-x:auto;}
  table.hc-table{width:100%;border-collapse:collapse;font-size:13px;min-width:920px;}
  table.hc-table thead th{
    background:var(--green);color:#fff;font-weight:600;padding:10px 10px;
    text-align:center;white-space:nowrap;
  }
  table.hc-table thead tr.subrow th{
    background:var(--green-mid);font-size:11.5px;font-weight:500;padding:6px 8px;
  }
  table.hc-table thead th.loja-head{text-align:left;padding-left:16px;}
  table.hc-table tbody td{padding:9px 10px;text-align:center;border-bottom:1px solid var(--green-border);}
  table.hc-table tbody td.loja-cell{text-align:left;padding-left:16px;font-weight:600;white-space:nowrap;}
  table.hc-table tbody tr:hover{background:var(--green-bg);}
  .real-ok{color:var(--green);font-weight:700;}
  .real-bad{color:var(--orange);font-weight:700;}
  .dif-badge{
    display:inline-block;min-width:34px;padding:3px 8px;border-radius:999px;
    font-size:12px;font-weight:700;font-family:'DM Mono',monospace;
  }
  .dif-pos{background:var(--green-bg);color:var(--green);}
  .dif-neg{background:var(--orange-bg);color:var(--orange);}
  .dif-zero{background:#eee;color:#666;}
  tr.total-row td{background:var(--black);color:#fff;font-weight:700;border-bottom:none;}
  tr.total-row td.loja-cell{color:#fff;}

  @media (max-width:1200px){
    .kpi-grid-5{grid-template-columns:repeat(3,1fr);}
  }
  @media (max-width:900px){
    .kpi-grid{grid-template-columns:repeat(2,1fr);}
    .kpi-grid-5{grid-template-columns:repeat(2,1fr);}
    .charts-row{flex-direction:column;}
  }
  @media (max-width:640px){
    #app{padding:18px 14px 48px;}
    .kpi-value{font-size:24px;}
  }

  /* ---------- Tabs ---------- */
  .tabs-nav{
    display:flex;gap:4px;margin-bottom:20px;border-bottom:1.5px solid var(--green-border);
  }
  .tab-btn{
    background:transparent;border:none;padding:11px 20px;font-family:inherit;
    font-size:14.5px;font-weight:600;color:var(--muted);cursor:pointer;
    border-bottom:3px solid transparent;margin-bottom:-1.5px;transition:color .15s ease;
  }
  .tab-btn:hover{color:var(--green-mid);}
  .tab-btn.active{color:var(--green);border-bottom-color:var(--green);}

  /* ---------- Turnover specifics ---------- */
  .kpi-formula{font-size:11px;color:var(--muted);margin-top:6px;font-style:italic;}
  .chart-empty{
    height:280px;display:flex;align-items:center;justify-content:center;text-align:center;
    color:var(--muted);font-size:13px;padding:20px;background:var(--bg-soft);border-radius:var(--radius-sm);
  }
  .btn-adjust{margin-top:10px;padding:6px 12px;font-size:11.5px;}

  /* ---------- Modal de seleção ---------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(13,20,18,0.45);z-index:100;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .modal-box{
    background:#fff;border-radius:var(--radius);width:100%;max-width:640px;
    max-height:82vh;display:flex;flex-direction:column;overflow:hidden;
    box-shadow:0 16px 48px rgba(10,20,15,0.25);
  }
  .modal-head{
    background:var(--green);color:#fff;padding:16px 20px;
    display:flex;justify-content:space-between;align-items:center;gap:12px;
  }
  .modal-head h3{margin:0;font-size:16px;}
  .modal-head .modal-close{
    background:transparent;border:none;color:#fff;font-size:20px;cursor:pointer;line-height:1;
  }
  .modal-toolbar{
    display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
    padding:12px 20px;border-bottom:1px solid var(--green-border);font-size:12.5px;
  }
  .modal-toolbar a{color:var(--green);font-weight:700;cursor:pointer;text-decoration:none;margin-right:14px;}
  .modal-count{color:var(--muted);}
  .modal-list{overflow-y:auto;padding:8px 12px;flex:1;}
  .modal-item{
    display:flex;align-items:flex-start;gap:10px;padding:9px 8px;border-radius:var(--radius-sm);
    cursor:pointer;border-bottom:1px solid rgba(10,107,44,0.07);
  }
  .modal-item:hover{background:var(--green-bg);}
  .modal-item input{accent-color:var(--green);width:16px;height:16px;margin-top:2px;flex:0 0 auto;}
  .modal-item .mi-nome{font-weight:600;font-size:13.5px;}
  .modal-item .mi-det{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .modal-item.excluded .mi-nome{color:var(--muted);text-decoration:line-through;}
  .modal-foot{
    padding:12px 20px;border-top:1px solid var(--green-border);
    display:flex;justify-content:flex-end;gap:10px;
  }

  /* ---------- Brand topbar ---------- */
  .brand-topbar{
    background:var(--green);color:#fff;
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;
    padding:14px 24px;border-radius:var(--radius);margin-bottom:22px;
  }
  .brand-logo-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .brand-logo{font-size:22px;font-weight:700;letter-spacing:-0.01em;}
  .brand-logo sup{font-size:11px;}
  .brand-badge{
    border:1.5px solid rgba(255,255,255,0.55);border-radius:999px;
    padding:4px 12px;font-size:10.5px;font-weight:700;letter-spacing:.03em;
  }
  .brand-period{margin-top:4px;font-size:11.5px;font-weight:600;color:rgba(255,255,255,0.85);letter-spacing:.02em;}
  .brand-updated{font-size:10.5px;color:#BFE6A6;}
  .brand-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .brand-pill{
    font-family:inherit;font-size:12px;font-weight:700;letter-spacing:.02em;
    border-radius:999px;padding:9px 16px;cursor:pointer;border:1.5px solid transparent;
    display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:opacity .12s ease;
  }
  .brand-pill:hover{opacity:.9;}
  .brand-pill-cloud{background:#BFE6A6;color:var(--green);}
  .brand-pill-local{background:var(--orange-bg);color:var(--orange);}
  .brand-pill-orange{background:var(--orange);color:#fff;}
  .brand-pill-outline{background:transparent;color:#fff;border-color:rgba(255,255,255,0.55);}
  .brand-pill-outline:hover{background:rgba(255,255,255,0.14);}
  .brand-settings-wrap{position:relative;}
  .brand-icon-btn{
    width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.55);
    background:transparent;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  .brand-icon-btn:hover{background:rgba(255,255,255,0.14);}
  .brand-settings-panel{
    position:absolute;top:calc(100% + 8px);right:0;background:#fff;z-index:30;
    border:1.5px solid var(--green-border);border-radius:var(--radius-sm);
    box-shadow:0 8px 24px rgba(10,20,15,0.15);padding:10px;min-width:180px;display:none;
  }
  .brand-settings-panel.open{display:block;}
  @media (max-width:720px){
    .brand-topbar{padding:14px 16px;}
    .brand-right{width:100%;justify-content:flex-start;}
  }
</style>
</head>
<body>
<div id="app">
  <div class="brand-topbar">
    <div class="brand-left">
      <div class="brand-logo-row">
        <span class="brand-logo">Cabana<sup>®</sup></span>
        <span class="brand-badge">BURGERS REAIS</span>
      </div>
      <div class="brand-period" id="brandPeriod">PERÍODO: carregue uma base para visualizar</div>
      <div class="brand-period brand-updated" id="brandUpdated" style="display:none;"></div>
    </div>
    <div class="brand-right">
      <button class="brand-pill brand-pill-cloud" id="brandCloudStatus" title="Origem dos dados">☁ NUVEM</button>
      <button class="brand-pill brand-pill-orange" id="brandLoadExcel">⬆ CARREGAR EXCEL</button>
      <button class="brand-pill brand-pill-outline" id="brandSync">⟳ SINCRONIZAR</button>

        <button class="brand-icon-btn" id="brandSettings" title="Configurações">⚙</button>
        <div class="brand-settings-panel" id="brandSettingsPanel">
          <button class="btn btn-danger" id="brandClearBase" style="width:100%;">🗑 Limpar base</button>
        </div>

    </div>
  </div>

  <div class="page-header">
    <div>
      <span class="eyebrow">● Cabana Burger · Gente &amp; Gestão</span>
      <h1>Painel de Gente — Headcount &amp; Turnover</h1>
      <p>Acompanhamento do quadro de pessoas frente à meta e leitura do turnover por unidade.</p>
    </div>
  </div>

  <div id="uploadZone"></div>
  <div id="dashboard" style="display:none;"></div>
</div>

<input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none"/>

<script>
/* =========================================================
   1. METAS (histórico por competência)
   ========================================================= */
// Cada loja tem uma lista de versões de meta, cada uma valendo "a partir de" um mês/ano.
// Para uma competência (year, month), usa-se a versão mais recente cujo "from" seja <= a competência.
// Se a loja não tiver nenhuma versão com "from" <= competência, ela é considerada "ainda não aberta" naquele mês.
const EPOCH = {year:2000, month:0}; // marca "sempre existiu, desde o início"

const METAS_HISTORY = {
  '26-CABANA GUARULHOS':      [{ from:EPOCH, lideranca:3,  salao:11, cozinha:9  }],
  '12-CABANA BRAZ LEME':      [{ from:EPOCH, lideranca:3,  salao:9,  cozinha:9  }],
  '27-CABANA MOOCA':          [{ from:EPOCH, lideranca:3,  salao:6,  cozinha:6  }],
  '32-CABANA TATUAPE':        [{ from:EPOCH, lideranca:3,  salao:9,  cozinha:9  }],
  '30-CABANA MORUMBI TOWN':   [{ from:EPOCH, lideranca:3,  salao:7,  cozinha:7  }],
  '08-CABANA OSCAR FREIRE':   [{ from:EPOCH, lideranca:4,  salao:11, cozinha:12 }],
  '22-CABANA PINHEIROS':      [{ from:EPOCH, lideranca:4,  salao:13, cozinha:14 }],
  '02-CABANA LEOPOLDO':       [{ from:EPOCH, lideranca:4,  salao:12, cozinha:15 }],
  '17-CABANA STO ANDRE':      [{ from:EPOCH, lideranca:3,  salao:7,  cozinha:8  }],
  '07-CABANA SHOP VL LOBOS':  [{ from:EPOCH, lideranca:3,  salao:7,  cozinha:7  }],
  '15-CABANA SHOP ELDORADO':  [{ from:EPOCH, lideranca:3,  salao:7,  cozinha:8  }],
  '11-CABANA ALPHAVILLE':     [{ from:EPOCH, lideranca:3,  salao:10, cozinha:11 }],
  '14-CABANA NITEROI':        [{ from:EPOCH, lideranca:3,  salao:7,  cozinha:7  }],
  '09-CABANA MOEMA':          [{ from:EPOCH, lideranca:4,  salao:12, cozinha:15 }],
  '24-CABANA RIB. PRETO':     [
    { from:EPOCH,              lideranca:3, salao:6, cozinha:7 },
    { from:{year:2026,month:5}, lideranca:0, salao:0, cozinha:0 } // zerada a partir de Jun/2026
  ],
  '06-CABANA SHOP MORUMBI':   [{ from:EPOCH, lideranca:3,  salao:10, cozinha:12 }],
  '05-CABANA BARRA SHOP':     [{ from:EPOCH, lideranca:3,  salao:12, cozinha:13 }],
  '13-CABANA CAMPINAS':       [{ from:EPOCH, lideranca:3,  salao:8,  cozinha:8  }],
  '19-CABANA CAMPO BELO':     [
    { from:{year:2026,month:6}, lideranca:3, salao:14, cozinha:12 } // nova loja a partir de Jul/2026
  ],
};
const STORE_KEYS = Object.keys(METAS_HISTORY);
const ORCADO_FACTOR = 1 - 0.085; // Quadro Orçado = Meta * 91,5%

function monthKeyOf(year, month){ return year*12 + month; }

// Retorna a versão de meta vigente para a loja numa competência (year, month), ou null se a loja ainda não existia
function getMetaForStoreMonth(storeKey, year, month){
  const versions = METAS_HISTORY[storeKey];
  if(!versions) return null;
  const targetKey = monthKeyOf(year, month);
  let applicable = null;
  let applicableKey = -Infinity;
  for(const v of versions){
    const vKey = monthKeyOf(v.from.year, v.from.month);
    if(vKey <= targetKey && vKey > applicableKey){
      applicable = v;
      applicableKey = vKey;
    }
  }
  return applicable;
}
function metaTotalForMonth(storeKey, year, month){
  const m = getMetaForStoreMonth(storeKey, year, month);
  return m ? (m.lideranca + m.salao + m.cozinha) : 0;
}

const MONTH_ABBR = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
function fmtMonth(year,month){ return MONTH_ABBR[month]+'/'+year; }
function fmtDateBR(d){
  if(!d) return '-';
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  return dd+'/'+mm+'/'+d.getFullYear();
}
function fmtDateTimeBR(d){
  if(!d) return '-';
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return fmtDateBR(d)+' às '+hh+':'+mi;
}

/* =========================================================
   2. STATE
   ========================================================= */
const state = {
  records: [],
  source: null,          // 'server' | 'upload'
  importedAt: null,
  availableMonths: [],    // [{year,month}] desc
  selectedMonth: null,
  selectedStores: new Set(STORE_KEYS),
  sortDir: null, // null | 'asc' | 'desc'
  activeTab: 'headcount',
  excludedAdm: new Set(), // eventos de admissão desconsiderados no turnover
  excludedDem: new Set(), // eventos de demissão desconsiderados no turnover
  charts: {}
};

/* =========================================================
   3. UTILS
   ========================================================= */
function normalize(s){
  return (s===null||s===undefined) ? '' : s.toString().trim().toUpperCase().replace(/\s+/g,' ');
}

function excelSerialToDate(serial){
  const utcDays = Math.floor(serial - 25569);
  const utcValue = utcDays * 86400;
  const date = new Date(utcValue * 1000);
  const fractional = serial - Math.floor(serial);
  const totalSeconds = Math.round(fractional * 86400);
  date.setSeconds(date.getSeconds()+totalSeconds);
  return new Date(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate());
}

function parseDateValue(v){
  if(v===null || v===undefined || v==='') return null;
  if(v instanceof Date){ return isNaN(v.getTime()) ? null : new Date(v.getFullYear(),v.getMonth(),v.getDate()); }
  if(typeof v === 'number'){ return excelSerialToDate(v); }
  if(typeof v === 'string'){
    const s = v.trim();
    if(!s) return null;
    let m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
    if(m){
      let d=parseInt(m[1],10), mo=parseInt(m[2],10), y=parseInt(m[3],10);
      if(m[3].length===2) y += 2000;
      const dt = new Date(y, mo-1, d);
      return isNaN(dt.getTime()) ? null : dt;
    }
    m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if(m){
      const dt = new Date(parseInt(m[1],10), parseInt(m[2],10)-1, parseInt(m[3],10));
      return isNaN(dt.getTime()) ? null : dt;
    }
    const parsed = new Date(s);
    return isNaN(parsed.getTime()) ? null : new Date(parsed.getFullYear(),parsed.getMonth(),parsed.getDate());
  }
  return null;
}

function matchStoreKey(lojaRaw){
  const n = normalize(lojaRaw);
  if(!n) return null;
  if(METAS_HISTORY[n]) return n;
  for(const key of STORE_KEYS){
    if(normalize(key)===n) return key;
  }
  for(const key of STORE_KEYS){
    const nk = normalize(key);
    const keyNoCode = nk.replace(/^\d+-\s*/,'');
    if(keyNoCode===n) return key;
  }
  for(const key of STORE_KEYS){
    const nk = normalize(key);
    const keyNoCode = nk.replace(/^\d+-\s*/,'');
    if(n.includes(keyNoCode) || keyNoCode.includes(n)) return key;
  }
  return null;
}

function classifyArea(centroCusto){
  const cc = normalize(centroCusto);
  if(cc.includes('LIDER')) return 'lideranca';
  if(cc.includes('SALÃO') || cc.includes('SALAO') || cc.includes('DELIVERY')) return 'salao';
  if(cc.includes('COZINHA') || cc.includes('BAR')) return 'cozinha';
  return 'outros';
}

/* =========================================================
   4. INDEXEDDB
   ========================================================= */
function openDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open('cabanaHeadcountDB', 1);
    req.onupgradeneeded = e=>{
      const db = e.target.result;
      if(!db.objectStoreNames.contains('dataset')) db.createObjectStore('dataset');
    };
    req.onsuccess = e=>resolve(e.target.result);
    req.onerror = e=>reject(e);
  });
}
async function idbSet(key,val){
  const db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction('dataset','readwrite');
    tx.objectStore('dataset').put(val,key);
    tx.oncomplete = ()=>resolve();
    tx.onerror = e=>reject(e);
  });
}
async function idbGet(key){
  const db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction('dataset','readonly');
    const req = tx.objectStore('dataset').get(key);
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = e=>reject(e);
  });
}
async function idbClear(){
  const db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction('dataset','readwrite');
    tx.objectStore('dataset').clear();
    tx.oncomplete = ()=>resolve();
    tx.onerror = e=>reject(e);
  });
}

/* =========================================================
   5. PARSE EXCEL
   ========================================================= */
function findColumn(row, candidates){
  const keys = Object.keys(row);
  for(const c of candidates){
    const found = keys.find(k=>k.trim().toUpperCase()===c.toUpperCase());
    if(found) return found;
  }
  return null;
}
function findCentroCustoColumn(row){
  const keys = Object.keys(row);
  return keys.find(k=>/centro/i.test(k) && /custo/i.test(k)) || null;
}

function parseWorkbook(arrayBuffer){
  const wb = XLSX.read(arrayBuffer, {type:'array', cellDates:true});
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet, {defval:null});
  if(!rows.length) return [];

  const colNome = findColumn(rows[0], ['Nome']);
  const colCargo = findColumn(rows[0], ['Cargo']);
  const colLoja = findColumn(rows[0], ['Nome Fantasia','Loja']);
  const colAdm = findColumn(rows[0], ['Dt Admissão','Data Admissão']);
  const colResc = findColumn(rows[0], ['Dt Rescisão','Data Rescisão']);
  const colCC = findCentroCustoColumn(rows[0]);

  const out = [];
  rows.forEach(row=>{
    const nome = colNome ? row[colNome] : null;
    const lojaRaw = colLoja ? row[colLoja] : null;
    if(!nome && !lojaRaw) return;
    const admissao = colAdm ? parseDateValue(row[colAdm]) : null;
    const rescisao = colResc ? parseDateValue(row[colResc]) : null;
    const centroCusto = colCC ? row[colCC] : '';
    const storeKey = matchStoreKey(lojaRaw);
    out.push({
      nome: nome || '',
      cargo: colCargo ? (row[colCargo]||'') : '',
      lojaRaw: lojaRaw || '',
      storeKey,
      centroCusto: centroCusto || '',
      admissao,
      rescisao
    });
  });
  return out;
}

/* =========================================================
   6. MESES DISPONÍVEIS
   ========================================================= */
function computeAvailableMonths(records){
  if(!records.length) return [];
  let minDate = null, maxDate = new Date();
  records.forEach(r=>{
    if(r.admissao && (!minDate || r.admissao < minDate)) minDate = r.admissao;
    if(r.admissao && r.admissao > maxDate) maxDate = r.admissao;
    if(r.rescisao && r.rescisao > maxDate) maxDate = r.rescisao;
  });
  if(!minDate) minDate = new Date();
  const months = [];
  let cur = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
  const end = new Date(maxDate.getFullYear(), maxDate.getMonth(), 1);
  while(cur <= end){
    months.push({year:cur.getFullYear(), month:cur.getMonth()});
    cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
  }
  months.reverse();
  return months;
}

/* =========================================================
   7. CÁLCULOS
   ========================================================= */
function monthKey(d){ return d.getFullYear()*12 + d.getMonth(); }

function getCountsForStoreMonth(storeKey, year, month){
  const targetKey = year*12 + month;
  const counts = {lideranca:0, salao:0, cozinha:0, total:0};
  const seenTotal = new Set();
  const seenArea = {lideranca:new Set(), salao:new Set(), cozinha:new Set()};
  for(const r of state.records){
    if(r.storeKey !== storeKey) continue;
    if(r.admissao && monthKey(r.admissao) > targetKey) continue;   // admitido depois do mês avaliado
    if(r.rescisao && monthKey(r.rescisao) <= targetKey) continue;  // rescisão no próprio mês avaliado ou antes (dia não importa)
    // sem Dt Rescisão, ou rescisão em mês posterior ao avaliado => considera ativo
    const personKey = normalize(r.nome);
    if(!seenTotal.has(personKey)){ seenTotal.add(personKey); counts.total++; }
    const area = classifyArea(r.centroCusto);
    if(area==='lideranca' && !seenArea.lideranca.has(personKey)){ seenArea.lideranca.add(personKey); counts.lideranca++; }
    else if(area==='salao' && !seenArea.salao.has(personKey)){ seenArea.salao.add(personKey); counts.salao++; }
    else if(area==='cozinha' && !seenArea.cozinha.has(personKey)){ seenArea.cozinha.add(personKey); counts.cozinha++; }
  }
  return counts;
}

function monthsBack(year, month, offset){
  const d = new Date(year, month-offset, 1);
  return {year:d.getFullYear(), month:d.getMonth()};
}

/* ---------- Cálculos de Turnover ---------- */
function getTotalAtivos(stores, year, month){
  let sum = 0;
  stores.forEach(k=>{ sum += getCountsForStoreMonth(k,year,month).total; });
  return sum;
}

function admEventKey(r){ return normalize(r.nome)+'|'+r.storeKey+'|'+r.admissao.getTime(); }
function demEventKey(r){ return normalize(r.nome)+'|'+r.storeKey+'|'+r.rescisao.getTime(); }

function getAdmissoesDemissoesMes(stores, year, month){
  let adm = 0, dem = 0;
  const seenAdm = new Set(), seenDem = new Set();
  state.records.forEach(r=>{
    if(!r.storeKey || !stores.includes(r.storeKey)) return;
    if(r.admissao && r.admissao.getFullYear()===year && r.admissao.getMonth()===month){
      const admKey = admEventKey(r);
      if(!seenAdm.has(admKey) && !state.excludedAdm.has(admKey)){ seenAdm.add(admKey); adm++; }
    }
    if(r.rescisao && r.rescisao.getFullYear()===year && r.rescisao.getMonth()===month){
      const demKey = demEventKey(r);
      if(!seenDem.has(demKey) && !state.excludedDem.has(demKey)){ seenDem.add(demKey); dem++; }
    }
  });
  return {adm, dem};
}

// Listas nominais de eventos do mês (sem aplicar exclusões — inclui flag "excluded" para a UI)
function getAdmissoesListMes(stores, year, month){
  const seen = new Set();
  const list = [];
  state.records.forEach(r=>{
    if(!r.storeKey || !stores.includes(r.storeKey)) return;
    if(!r.admissao || r.admissao.getFullYear()!==year || r.admissao.getMonth()!==month) return;
    const key = admEventKey(r);
    if(seen.has(key)) return;
    seen.add(key);
    list.push({key, r, excluded: state.excludedAdm.has(key)});
  });
  list.sort((a,b)=> a.r.nome.localeCompare(b.r.nome));
  return list;
}
function getDemissoesListMes(stores, year, month){
  const seen = new Set();
  const list = [];
  state.records.forEach(r=>{
    if(!r.storeKey || !stores.includes(r.storeKey)) return;
    if(!r.rescisao || r.rescisao.getFullYear()!==year || r.rescisao.getMonth()!==month) return;
    const key = demEventKey(r);
    if(seen.has(key)) return;
    seen.add(key);
    list.push({key, r, excluded: state.excludedDem.has(key)});
  });
  list.sort((a,b)=> a.r.nome.localeCompare(b.r.nome));
  return list;
}

// Turnover do mês = ((Admissões + Demissões) / 2) ÷ Total de colaboradores ativos no mês
function turnoverRateMes(stores, year, month){
  const {adm, dem} = getAdmissoesDemissoesMes(stores, year, month);
  const total = getTotalAtivos(stores, year, month);
  if(total <= 0) return 0;
  return ((adm+dem)/2) / total * 100;
}

// Turnover acumulado nos últimos N meses = Σ demissões ÷ média de ativos no período
function turnoverAcumulado(stores, year, month, monthsWindow){
  let sumDem = 0, sumTotal = 0;
  for(let i=0;i<monthsWindow;i++){
    const {year:y, month:m} = monthsBack(year, month, i);
    sumDem += getAdmissoesDemissoesMes(stores,y,m).dem;
    sumTotal += getTotalAtivos(stores,y,m);
  }
  const avgTotal = sumTotal / monthsWindow;
  if(avgTotal <= 0) return 0;
  return (sumDem / avgTotal) * 100;
}

function getWindowRange(year, month, monthsWindow){
  const end = new Date(year, month+1, 0);
  const startRef = monthsBack(year, month, monthsWindow-1);
  const start = new Date(startRef.year, startRef.month, 1);
  return {start, end};
}

// Desligamentos (eventos de rescisão) dentro de uma janela, deduplicados por pessoa+data
function getDismissalsInWindow(stores, year, month, monthsWindow){
  const {start, end} = getWindowRange(year, month, monthsWindow);
  const seen = new Set();
  const result = [];
  state.records.forEach(r=>{
    if(!r.storeKey || !stores.includes(r.storeKey)) return;
    if(!r.rescisao) return;
    if(r.rescisao < start || r.rescisao > end) return;
    const key = demEventKey(r);
    if(seen.has(key) || state.excludedDem.has(key)) return;
    seen.add(key);
    result.push(r);
  });
  return result;
}

function tenureMonths(r){
  if(!r.admissao || !r.rescisao) return null;
  const diffMs = r.rescisao.getTime() - r.admissao.getTime();
  if(diffMs < 0) return null;
  return diffMs / (1000*60*60*24*30.44);
}

const TENURE_BUCKETS = ['< 3 meses','3-6 meses','6-12 meses','1-2 anos','2-5 anos','5+ anos','Sem admissão'];
function tenureBucket(months){
  if(months===null) return 'Sem admissão';
  if(months<3) return '< 3 meses';
  if(months<6) return '3-6 meses';
  if(months<12) return '6-12 meses';
  if(months<24) return '1-2 anos';
  if(months<60) return '2-5 anos';
  return '5+ anos';
}

function countByKey(list, keyFn){
  const map = new Map();
  list.forEach(item=>{
    const k = keyFn(item);
    map.set(k, (map.get(k)||0)+1);
  });
  return map;
}

function buildRows(){
  const stores = STORE_KEYS.filter(k=>state.selectedStores.has(k));
  const {year, month} = state.selectedMonth;
  const rows = stores
    .map(storeKey=>{
      const real = getCountsForStoreMonth(storeKey, year, month);
      const metaVersion = getMetaForStoreMonth(storeKey, year, month);
      // Se não há meta vigente nessa competência mas já existem pessoas ativas na loja,
      // ainda assim mostramos a linha (meta = 0) para não escondermos headcount real.
      if(!metaVersion && real.total === 0) return null; // loja de fato ainda não existe nessa competência
      const meta = metaVersion || {lideranca:0, salao:0, cozinha:0};
      const mTotal = meta.lideranca + meta.salao + meta.cozinha;
      return {storeKey, meta, mTotal, real, dif: real.total - mTotal};
    })
    .filter(Boolean);
  if(state.sortDir === 'asc') rows.sort((a,b)=> a.dif - b.dif);
  else if(state.sortDir === 'desc') rows.sort((a,b)=> b.dif - a.dif);
  return rows;
}

async function handleFile(file){
  try{
    const buf = await file.arrayBuffer();
    const records = parseWorkbook(buf);
    if(!records.length){
      alert('Não foi possível localizar registros válidos nessa planilha. Verifique as colunas obrigatórias.');

    state.records = records;
    state.source = 'upload';
    state.importedAt = new Date();
    state.dataUpdatedAt = new Date();
    await idbSet('main', {records, importedAt: state.importedAt, source:'upload', dataUpdatedAt: state.dataUpdatedAt});
    document.getElementById('uploadZone').style.display='none';
    setupAfterLoad();
  }catch(err){
    console.error(err);
    alert('Erro ao processar o arquivo. Confirme se é um .xlsx válido.');
  }
}

// Custom plugin: draw numeric value on top of bars
function valueLabelPlugin(suffix){
  return {
    id:'valueLabel_'+suffix+Math.random(),
    afterDatasetsDraw(chart){
      const {ctx} = chart;
      chart.data.datasets.forEach((ds, dsIndex)=>{
        const meta = chart.getDatasetMeta(dsIndex);
        if(meta.type !== 'bar') return;
        meta.data.forEach((bar, i)=>{
          const val = ds.data[i];
          if(val===undefined||val===null) return;
          ctx.save();
          ctx.fillStyle = ds.labelColor || '#0d1412';
          ctx.font = '700 11px DM Sans, sans-serif';
          ctx.textAlign = 'center';
          const label = suffix==='%' ? Math.round(val)+'%' : val;
          ctx.fillText(label, bar.x, bar.y - 6);
          ctx.restore();
        });
      });
    }
  };
}
function targetLinePlugin(value, color){
  color = color || '#0A6B2C';
  return {
    id:'targetLine_'+value,
    afterDraw(chart){
      const yScale = chart.scales.y;
      const {ctx, chartArea} = chart;
      const y = yScale.getPixelForValue(value);
      ctx.save();
      ctx.strokeStyle = color;
      ctx.setLineDash([6,4]);
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(chartArea.left, y);
      ctx.lineTo(chartArea.right, y);
      ctx.stroke();
      ctx.restore();
    }
  };
}

// Rótulos de dados para o gráfico LTM (barras Real + linha Meta)
function ltmLabelPlugin(){
  return {
    id:'ltmLabels',
    afterDatasetsDraw(chart){
      const {ctx} = chart;
      chart.data.datasets.forEach((ds, dsIndex)=>{
        const meta = chart.getDatasetMeta(dsIndex);
        meta.data.forEach((el, i)=>{
          const val = ds.data[i];
          if(val===undefined || val===null) return;
          ctx.save();
          ctx.font = '600 11px DM Sans, sans-serif';
          ctx.textAlign = 'center';
          if(meta.type === 'bar'){
            const midY = (el.y + el.base) / 2;
            ctx.fillStyle = '#ffffff';
            ctx.textBaseline = 'middle';
            ctx.fillText(val, el.x, midY);
          } else if(meta.type === 'line'){
            ctx.fillStyle = ds.borderColor || '#6A4C93';
            const offset = 10 + (dsIndex-1)*14;
            ctx.fillText(val, el.x, el.y - offset);
          }
          ctx.restore();
        });
      });
    }
  };
}

/* =========================================================
   11. RECALC / RENDER DATA
   ========================================================= */
function recalcAll(){
  const rows = buildRows();
  const totalMeta = {lideranca:0, salao:0, cozinha:0, total:0};
  const totalReal = {lideranca:0, salao:0, cozinha:0, total:0};
  rows.forEach(r=>{
    totalMeta.lideranca += r.meta.lideranca;
    totalMeta.salao += r.meta.salao;
    totalMeta.cozinha += r.meta.cozinha;
    totalMeta.total += r.mTotal;
    totalReal.lideranca += r.real.lideranca;
    totalReal.salao += r.real.salao;
    totalReal.cozinha += r.real.cozinha;
    totalReal.total += r.real.total;
  });

  renderKPIs(totalMeta, totalReal, rows);
  renderTable(rows, totalMeta, totalReal);
  updateChartArea(totalMeta, totalReal);
  updateChartPct(totalMeta, totalReal);
  updateChartLTM(totalMeta.total);
  recalcTurnover();

  document.getElementById('exportHeaderSub').textContent =
    `${fmtMonth(state.selectedMonth.year, state.selectedMonth.month)} · ${rows.length} loja(s) · gerado em ${fmtDateBR(new Date())}`;
}

function renderKPIs(totalMeta, totalReal, rows){
  document.getElementById('kpiMeta').textContent = totalMeta.total;

  const orcado = Math.round(totalMeta.total * ORCADO_FACTOR);
  document.getElementById('kpiOrcado').textContent = orcado;

  document.getElementById('kpiReal').textContent = totalReal.total;

  const dif = totalReal.total - totalMeta.total;
  const kpiDif = document.getElementById('kpiDif');
  kpiDif.textContent = (dif>=0?'+':'') + dif;
  kpiDif.className = 'kpi-value mono kpi-value-sm ' + (dif>=0?'positive':'negative');

  const difOrcado = totalReal.total - orcado;
  const kpiDifOrcado = document.getElementById('kpiDifOrcado');
  kpiDifOrcado.textContent = (difOrcado>=0?'+':'') + difOrcado;
  kpiDifOrcado.className = 'kpi-value mono kpi-value-sm ' + (difOrcado>=0?'positive':'negative');

  const onTarget = rows.filter(r=>r.real.total >= r.mTotal).length;
  document.getElementById('kpiLojasMeta').textContent = `${onTarget} de ${rows.length}`;
}

function renderTable(rows, totalMeta, totalReal){
  const tbody = document.getElementById('tableBody');
  function cell(real, meta){
    const cls = real >= meta ? 'real-ok' : 'real-bad';
    return `<td>${meta}</td><td class="${cls}">${real}</td>`;
  }
  function difBadge(dif){
    const cls = dif>0?'dif-pos':(dif<0?'dif-neg':'dif-zero');
    const label = dif>0? '+'+dif : dif;
    return `<span class="dif-badge ${cls}">${label}</span>`;
  }
  let html = '';
  rows.forEach(r=>{
    html += `<tr>
      <td class="loja-cell">${r.storeKey}</td>
      ${cell(r.real.lideranca, r.meta.lideranca)}
      ${cell(r.real.salao, r.meta.salao)}
      ${cell(r.real.cozinha, r.meta.cozinha)}
      ${cell(r.real.total, r.mTotal)}
      <td>${difBadge(r.dif)}</td>
    </tr>`;
  });
  const totalDif = totalReal.total - totalMeta.total;
  html += `<tr class="total-row">
    <td class="loja-cell">TOTAL (${rows.length} lojas)</td>
    <td>${totalMeta.lideranca}</td><td>${totalReal.lideranca}</td>
    <td>${totalMeta.salao}</td><td>${totalReal.salao}</td>
    <td>${totalMeta.cozinha}</td><td>${totalReal.cozinha}</td>
    <td>${totalMeta.total}</td><td>${totalReal.total}</td>
    <td>${difBadge(totalDif)}</td>
  </tr>`;
  tbody.innerHTML = html;
}

function updateChartArea(totalMeta, totalReal){
  const chart = state.charts.area;
  const metaData = [totalMeta.lideranca, totalMeta.salao, totalMeta.cozinha];
  const orcadoData = metaData.map(v=>Math.round(v*ORCADO_FACTOR));
  const realData = [totalReal.lideranca, totalReal.salao, totalReal.cozinha];
  chart.data.datasets[0].data = metaData;
  chart.data.datasets[1].data = orcadoData;
  chart.data.datasets[2].data = realData;
  chart.data.datasets[2].backgroundColor = realData.map((v,i)=> v>=metaData[i] ? 'rgba(10,107,44,0.35)' : 'rgba(255,80,40,0.35)');
  chart.update();
}

function updateChartPct(totalMeta, totalReal){
  const chart = state.charts.pct;
  const metaVals = [totalMeta.lideranca,totalMeta.salao,totalMeta.cozinha];
  const orcadoVals = metaVals.map(v=>Math.round(v*ORCADO_FACTOR));
  const realVals = [totalReal.lideranca,totalReal.salao,totalReal.cozinha];

  const pctMeta = realVals.map((real,i)=> metaVals[i]>0 ? Math.round((real/metaVals[i])*100) : 0);
  const pctOrcado = realVals.map((real,i)=> orcadoVals[i]>0 ? Math.round((real/orcadoVals[i])*100) : 0);

  chart.data.datasets[0].data = pctMeta;
  chart.data.datasets[0].backgroundColor = pctMeta.map(v=> v>=100 ? '#0A6B2C' : '#FF5028');
  chart.data.datasets[1].data = pctOrcado;
  chart.data.datasets[1].backgroundColor = pctOrcado.map(v=> v>=100 ? 'rgba(10,107,44,0.7)' : 'rgba(255,80,40,0.7)');
  chart.update();
}

function updateChartLTM(currentMetaTotal){
  const chart = state.charts.ltm;
  const {year, month} = state.selectedMonth;
  const stores = STORE_KEYS.filter(k=>state.selectedStores.has(k));

  const labels = [];
  const realData = [];
  const metaData = [];
  const orcadoData = [];
  for(let i=11;i>=0;i--){
    const {year:y, month:m} = monthsBack(year, month, i);
    labels.push(fmtMonth(y,m));
    let sum = 0;
    let metaSum = 0;
    stores.forEach(k=>{
      sum += getCountsForStoreMonth(k,y,m).total;
      metaSum += metaTotalForMonth(k,y,m);
    });
    realData.push(sum);
    metaData.push(metaSum);
    orcadoData.push(Math.round(metaSum * ORCADO_FACTOR));
  }
  chart.data.labels = labels;
  chart.data.datasets[0].data = realData;
  chart.data.datasets[0].backgroundColor = realData.map((v,i)=> v>=metaData[i] ? '#0A6B2C' : '#FF5028');
  chart.data.datasets[1].data = metaData;
  chart.data.datasets[2].data = orcadoData;
  chart.update();
}

/* =========================================================
   11.5 GERAR BASE DE ATIVOS (Excel)
   ========================================================= */
function getActiveEmployeesForMonth(stores, year, month){
  const targetKey = year*12 + month;
  const seen = new Set();
  const list = [];
  for(const r of state.records){
    if(!r.storeKey || !stores.includes(r.storeKey)) continue;
    if(r.admissao && monthKey(r.admissao) > targetKey) continue;
    if(r.rescisao && monthKey(r.rescisao) <= targetKey) continue;
    const personKey = r.storeKey + '|' + normalize(r.nome);
    if(seen.has(personKey)) continue;
    seen.add(personKey);
    list.push(r);
  }
  // Ordena por loja e depois por nome
  list.sort((a,b)=> a.storeKey===b.storeKey ? a.nome.localeCompare(b.nome) : a.storeKey.localeCompare(b.storeKey));
  return list;
}

function gerarBaseAtivos(){
  const stores = STORE_KEYS.filter(k=>state.selectedStores.has(k));
  if(!stores.length){
    alert('Selecione ao menos uma loja no filtro de Lojas para gerar a base.');
    return;
  }
  const {year, month} = state.selectedMonth;
  const ativos = getActiveEmployeesForMonth(stores, year, month);
  if(!ativos.length){
    alert('Nenhum colaborador ativo encontrado para as lojas selecionadas nessa competência.');
    return;
  }
  const AREA_LABEL = {lideranca:'Liderança', salao:'Salão e Delivery', cozinha:'Cozinha e Bar', outros:'Outros'};
  const data = ativos.map(r=>({
    'Loja': r.storeKey,
    'Nome': r.nome,
    'Cargo': r.cargo || '',
    'Centro de Custo': r.centroCusto || '',
    'Área': AREA_LABEL[classifyArea(r.centroCusto)],
    'Dt Admissão': r.admissao ? fmtDateBR(r.admissao) : '',
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  // Larguras de coluna amigáveis
  ws['!cols'] = [{wch:26},{wch:40},{wch:38},{wch:22},{wch:18},{wch:12}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Ativos');
  const compName = fmtMonth(year, month).replace('/','-');
  XLSX.writeFile(wb, `BaseAtivos_${compName}.xlsx`);
}

async function exportAsImage(){

  const header = document.getElementById('exportHeader');

    const target = document.getElementById('exportTarget');

    const now = new Date();
    const dd = String(now.getDate()).padStart(2,'0');
    const mm = String(now.getMonth()+1).padStart(2,'0');
    const yyyy = now.getFullYear();
    const link = document.createElement('a');
    link.download = `MetaReal_${dd}-${mm}-${yyyy}.png`;
    link.href = canvas.toDataURL('image/png');

    alert('Não foi possível gerar a imagem.');

    header.classList.remove('show');
    btn.textContent = originalLabel;
    btn.disabled = false;
  }
}

function fmtPct(v){ return v.toFixed(1).replace('.', ',') + '%'; }

function recalcTurnover(){
  const stores = STORE_KEYS.filter(k=>state.selectedStores.has(k));
  const {year, month} = state.selectedMonth;

  const {adm, dem} = getAdmissoesDemissoesMes(stores, year, month);
  const rateMes = turnoverRateMes(stores, year, month);
  const rate12m = turnoverAcumulado(stores, year, month, 12);

  document.getElementById('kpiTurnoverMes').textContent = fmtPct(rateMes);
  document.getElementById('kpiAdmissoesMes').textContent = adm;
  document.getElementById('kpiDemissoesMes').textContent = dem;
  document.getElementById('kpiTurnover12m').textContent = fmtPct(rate12m);

  // Contagem de desconsiderados no mês atual (para o subtítulo dos cards)
  const admList = getAdmissoesListMes(stores, year, month);
  const demList = getDemissoesListMes(stores, year, month);
  const admExcl = admList.filter(i=>i.excluded).length;
  const demExcl = demList.filter(i=>i.excluded).length;
  document.getElementById('kpiAdmSub').textContent = admExcl ? `Entradas no período · ${admExcl} desconsiderada(s)` : 'Entradas no período';
  document.getElementById('kpiDemSub').textContent = demExcl ? `Saídas no período · ${demExcl} desconsiderada(s)` : 'Saídas no período';

  // LTM combo
  const labels = [], admData = [], demData = [], rateData = [];
  for(let i=11;i>=0;i--){
    const {year:y, month:m} = monthsBack(year, month, i);
    labels.push(fmtMonth(y,m));
    const md = getAdmissoesDemissoesMes(stores,y,m);
    admData.push(md.adm);
    demData.push(md.dem);
    rateData.push(Number(turnoverRateMes(stores,y,m).toFixed(1)));
  }
  const ltm = state.charts.turnoverLTM;
  ltm.data.labels = labels;
  ltm.data.datasets[0].data = admData;
  ltm.data.datasets[1].data = demData;
  ltm.data.datasets[2].data = rateData;
  ltm.update();

  // Desligamentos na janela de 12 meses (base para os demais gráficos)
  const dismissals = getDismissalsInWindow(stores, year, month, 12);

  // Por tempo de casa
  const tenureCounts = TENURE_BUCKETS.reduce((acc,b)=>{acc[b]=0; return acc;}, {});
  dismissals.forEach(r=>{ tenureCounts[tenureBucket(tenureMonths(r))]++; });
  state.charts.tenure.data.datasets[0].data = TENURE_BUCKETS.map(b=>tenureCounts[b]);
  state.charts.tenure.update();

  // Por loja
  const byStoreMap = countByKey(dismissals, r=>r.storeKey);
  const storeEntries = stores
    .map(k=>({label:k, value: byStoreMap.get(k)||0}))
    .filter(e=>e.value>0)
    .sort((a,b)=>b.value-a.value);
  state.charts.byStore.data.labels = storeEntries.map(e=>e.label);
  state.charts.byStore.data.datasets[0].data = storeEntries.map(e=>e.value);
  state.charts.byStore.update();

  // Por cargo (top 8)
  const byCargoMap = countByKey(dismissals, r=> (r.cargo && r.cargo.toString().trim()) || 'Não informado');
  const cargoEntries = Array.from(byCargoMap.entries())
    .map(([label,value])=>({label,value}))
    .sort((a,b)=>b.value-a.value)
    .slice(0,8);
  state.charts.byCargo.data.labels = cargoEntries.map(e=>e.label);
  state.charts.byCargo.data.datasets[0].data = cargoEntries.map(e=>e.value);
  state.charts.byCargo.update();
}

/* =========================================================
   14.5 MODAL DE AJUSTE DE ADMISSÕES/DEMISSÕES
   ========================================================= */
function openAdjustModal(type){
  const stores = STORE_KEYS.filter(k=>state.selectedStores.has(k));
  const {year, month} = state.selectedMonth;
  const isAdm = type === 'adm';
  const list = isAdm ? getAdmissoesListMes(stores, year, month) : getDemissoesListMes(stores, year, month);
  const exclSet = isAdm ? state.excludedAdm : state.excludedDem;
  const titulo = isAdm ? 'Admissões' : 'Demissões';
  const compLabel = fmtMonth(year, month);

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-head">
        <h3>${titulo} — ${compLabel}</h3>
        <button class="modal-close" title="Fechar">✕</button>
      </div>
      <div class="modal-toolbar">
        <div>
          <a data-action="all">Marcar todos</a>
          <a data-action="none">Desmarcar todos</a>
        </div>
        <span class="modal-count"></span>
      </div>
      <div class="modal-list"></div>
      <div class="modal-foot">
        <button class="btn btn-primary modal-done">Concluir</button>
      </div>
    </div>
  `;

  const listEl = overlay.querySelector('.modal-list');
  const countEl = overlay.querySelector('.modal-count');

  function refreshCount(){
    const total = list.length;
    const considered = list.filter(i=>!exclSet.has(i.key)).length;
    countEl.textContent = `${considered} de ${total} considerado(s) no turnover`;
  }

  function renderList(){
    if(!list.length){
      listEl.innerHTML = `<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px;">Nenhum evento de ${titulo.toLowerCase()} nas lojas filtradas nessa competência.</div>`;
      refreshCount();
      return;
    }
    listEl.innerHTML = list.map(item=>{
      const dt = isAdm ? item.r.admissao : item.r.rescisao;
      const checked = !exclSet.has(item.key);
      return `
        <label class="modal-item ${checked?'':'excluded'}" data-key="${item.key}">
          <input type="checkbox" ${checked?'checked':''}/>
          <div>
            <div class="mi-nome">${item.r.nome}</div>
            <div class="mi-det">${item.r.storeKey} · ${item.r.cargo || 'Cargo não informado'} · ${fmtDateBR(dt)}</div>
          </div>
        </label>
      `;
    }).join('');
    refreshCount();

    listEl.querySelectorAll('.modal-item').forEach(el=>{
      const cb = el.querySelector('input');
      cb.addEventListener('change', ()=>{
        const key = el.dataset.key;
        if(cb.checked) exclSet.delete(key);
        else exclSet.add(key);
        el.classList.toggle('excluded', !cb.checked);
        refreshCount();
        recalcTurnover(); // atualiza KPIs e gráficos em tempo real
      });
    });
  }

  overlay.querySelector('[data-action=all]').onclick = ()=>{
    list.forEach(i=>exclSet.delete(i.key));
    renderList();
    recalcTurnover();
  };
  overlay.querySelector('[data-action=none]').onclick = ()=>{
    list.forEach(i=>exclSet.add(i.key));
    renderList();
    recalcTurnover();
  };

  function close(){ overlay.remove(); }
  overlay.querySelector('.modal-close').onclick = close;
  overlay.querySelector('.modal-done').onclick = close;
  overlay.addEventListener('click', e=>{ if(e.target===overlay) close(); });

  renderList();
  document.body.appendChild(overlay);
}

function updateBrandBar(){
  const periodEl = document.getElementById('brandPeriod');
  if(!state.availableMonths || !state.availableMonths.length){
    periodEl.textContent = 'PERÍODO: carregue uma base para visualizar';
  } else {
    const oldest = state.availableMonths[state.availableMonths.length-1];
    const newest = state.availableMonths[0];
    const startDate = new Date(oldest.year, oldest.month, 1);
    const endDate = new Date(newest.year, newest.month+1, 0);
    const n = state.availableMonths.length;
    periodEl.textContent = `PERÍODO: ${fmtDateBR(startDate)} - ${fmtDateBR(endDate)} (${n} MES${n===1?'':'ES'})`;
  }

  const updatedEl = document.getElementById('brandUpdated');
  if(state.dataUpdatedAt && state.records.length){
    updatedEl.textContent = `ÚLTIMA ATUALIZAÇÃO: ${fmtDateTimeBR(state.dataUpdatedAt)}`;
    updatedEl.style.display = 'block';
  } else {
    updatedEl.style.display = 'none';
  }

  const cloudBtn = document.getElementById('brandCloudStatus');
  if(state.source === 'upload'){
    cloudBtn.textContent = '💻 LOCAL';
    cloudBtn.classList.add('brand-pill-local');
  } else {
    cloudBtn.textContent = '☁ NUVEM';
    cloudBtn.classList.remove('brand-pill-local');
  }
}

async function handleSyncClick(){
  const btn = document.getElementById('brandSync');
  const original = btn.innerHTML;
  btn.innerHTML = '⏳ Sincronizando...';
  btn.disabled = true;
  try{
    const ok = await loadFromServer();
    if(ok){
      alert('Base sincronizada com sucesso a partir do servidor.');
    } else {
      alert('Não encontrei a base no servidor.\n\nVerifique no seu repositório do GitHub:\n1. Existe uma pasta chamada "data" (minúscula) na MESMA pasta do index.html?\n2. Dentro dela existe o arquivo "dados.xlsx" (nome exato, minúsculo)?\n3. O GitHub Pages terminou de publicar? (pode levar 1-2 min após o commit)');
    }
  }catch(e){
    alert('Não foi possível sincronizar com o servidor agora.');
  }finally{
    btn.innerHTML = original;
    btn.disabled = false;
  }
}

function initBrandBar(){
  document.getElementById('brandLoadExcel').onclick = ()=>document.getElementById('fileInput').click();
  document.getElementById('brandSync').onclick = handleSyncClick;
  document.getElementById('brandExit').onclick = ()=>{
    alert('Este painel funciona localmente no seu navegador e não exige login — você pode simplesmente fechar esta aba.');
  };
  const settingsBtn = document.getElementById('brandSettings');
  const settingsPanel = document.getElementById('brandSettingsPanel');
  settingsBtn.onclick = (e)=>{
    e.stopPropagation();
    settingsPanel.classList.toggle('open');
  };
  document.addEventListener('click', (e)=>{
    if(!settingsPanel.contains(e.target) && e.target!==settingsBtn) settingsPanel.classList.remove('open');
  });
  document.getElementById('brandClearBase').onclick = ()=>{
    settingsPanel.classList.remove('open');
    clearBaseFlow();
  };
  updateBrandBar();
}

/* =========================================================
   16. BOOTSTRAP
   ========================================================= */
// Caminhos onde o arquivo da base pode estar no servidor (GitHub Pages).
// Atenção: GitHub Pages diferencia maiúsculas/minúsculas no caminho!
const SERVER_DATA_PATHS = ['./data/dados.xlsx', './dados.xlsx', './Data/dados.xlsx', './data/Dados.xlsx'];

async function fetchServerBase(){
  for(const path of SERVER_DATA_PATHS){
    try{
      const resp = await fetch(path, {cache:'no-store'});
      if(!resp.ok) continue;
      const buf = await resp.arrayBuffer();
      // valida assinatura de arquivo xlsx (ZIP começa com "PK")
      const bytes = new Uint8Array(buf.slice(0,2));
      if(!(bytes[0]===0x50 && bytes[1]===0x4B)) continue;
      const lastModHeader = resp.headers.get('Last-Modified');
      const lastMod = lastModHeader ? new Date(lastModHeader) : null;
      return {buf, lastMod, path};
    }catch(e){ /* tenta o próximo caminho */ }
  }
  return null;
}

async function loadFromServer(){
  const found = await fetchServerBase();
  if(!found) return false;
  const records = parseWorkbook(found.buf);
  if(!records.length) return false;
  state.records = records;
  state.source = 'server';
  state.importedAt = new Date();
  state.dataUpdatedAt = found.lastMod || new Date();
  await idbSet('main', {records, importedAt:state.importedAt, source:'server', dataUpdatedAt:state.dataUpdatedAt});
  setupAfterLoad();
  return true;
}

function setupAfterLoad(){
  state.availableMonths = computeAvailableMonths(state.records);
  state.selectedMonth = state.availableMonths[0] || {year:new Date().getFullYear(), month:new Date().getMonth()};
  state.selectedStores = new Set(STORE_KEYS);
  state.excludedAdm = new Set();
  state.excludedDem = new Set();
  const uz = document.getElementById('uploadZone');
  uz.style.display='none';
  uz.innerHTML='';
  renderStatusBar();
  renderDashboardShell();
  recalcAll();
}

async function init(){
  try{
    if(await loadFromServer()) return;
  }catch(e){ /* segue para IndexedDB */ }

  try{
    const saved = await idbGet('main');
    if(saved && saved.records && saved.records.length){
      state.records = saved.records;
      state.source = saved.source || 'upload';
      state.importedAt = saved.importedAt ? new Date(saved.importedAt) : new Date();
      state.dataUpdatedAt = saved.dataUpdatedAt ? new Date(saved.dataUpdatedAt) : state.importedAt;
      setupAfterLoad();
      return;
    }
  }catch(e){ console.warn('IndexedDB indisponível', e); }

  renderUploadZone();
}

document.addEventListener('DOMContentLoaded', ()=>{
  initBrandBar();
  init();
});
